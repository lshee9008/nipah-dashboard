services:
  - type: web
    name: nipah-tracker
    runtime: python
    plan: starter          # $7/월 — 슬립 없음, 항상 켜짐
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: nipah-db
          property: connectionString

databases:
  - name: nipah-db
    plan: starter          # $7/월 PostgreSQL (90일 무료 후 유료 전환)